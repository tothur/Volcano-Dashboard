<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A static-first global volcano monitoring dashboard using NOAA, Smithsonian, and USGS public data."
    />
    <meta name="theme-color" content="#0d1219" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Volcanoes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Volcanoes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%icons/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%icons/apple-touch-icon.png" />
    <link rel="manifest" href="%BASE_URL%site.webmanifest" />
    <title>Volcano Monitoring Dashboard</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("volcano-dashboard-theme") || "auto";
          var theme = stored === "auto" ? (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light") : stored;
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (error) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
